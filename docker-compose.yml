services:
  app:
    build: .
    # To use the pre-built image instead of building locally, comment out 'build' and uncomment:
    # image: ghcr.io/guidorugo/cert-manager:latest
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - MASTER_PASSPHRASE=${MASTER_PASSPHRASE:?MASTER_PASSPHRASE must be set}
      - DATABASE_URL=sqlite:////app/data/cert-manager.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SERVER_NAME_FOR_OCSP=${SERVER_NAME_FOR_OCSP:-localhost:5000}
    restart: unless-stopped
