{% extends "base.html" %}
{% block title %}Edit User - Cert Manager{% endblock %}
{% block content %}
<h2>Edit User: {{ user.username }}</h2>

<div class="row mt-3">
    <div class="col-md-6">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" value="{{ user.username }}" disabled>
            </div>
            <div class="mb-3">
                <label for="role" class="form-label">Role</label>
                <select class="form-select" id="role" name="role">
                    <option value="csr_requester" {{ 'selected' if user.role == 'csr_requester' }}>CSR Requester</option>
                    <option value="csr_user" {{ 'selected' if user.role == 'csr_user' }}>CSR User</option>
                    <option value="admin" {{ 'selected' if user.role == 'admin' }}>Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('users.list_users') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
