{% extends "base.html" %}
{% block title %}Create Certificate - Cert Manager{% endblock %}
{% block content %}
<h2>Create Certificate</h2>

<form method="POST" class="mt-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="row">
        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-header">Certificate Settings</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="ca_id" class="form-label">Issuing CA
                            <span class="field-info" data-bs-toggle="tooltip" title="The Certificate Authority that will sign this certificate.">!</span>
                        </label>
                        <select class="form-select" id="ca_id" name="ca_id" required>
                            {% for ca in cas %}
                            <option value="{{ ca.id }}">{{ ca.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="key_type" class="form-label">Key Type
                                    <span class="field-info" data-bs-toggle="tooltip" title="RSA is widely compatible. EC (Elliptic Curve) offers smaller keys with equivalent security.">!</span>
                                </label>
                                <select class="form-select" id="key_type" name="key_type" onchange="updateKeySizes()">
                                    <option value="RSA">RSA</option>
                                    <option value="EC">EC</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="key_size" class="form-label">Key Size
                                    <span class="field-info" data-bs-toggle="tooltip" title="For RSA: 2048 or 4096 bits. For EC: 256 or 384 bits (curve size).">!</span>
                                </label>
                                <select class="form-select" id="key_size" name="key_size">
                                    <option value="2048">2048</option>
                                    <option value="4096">4096</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="validity_days" class="form-label">Validity (days)
                            <span class="field-info" data-bs-toggle="tooltip" title="Number of days until this certificate expires. Typical: 365 (1 year).">!</span>
                        </label>
                        <input type="number" class="form-control" id="validity_days" name="validity_days" value="365">
                    </div>
                    <div class="mb-3">
                        <label for="san" class="form-label">Subject Alternative Names
                            <span class="field-info" data-bs-toggle="tooltip" title="Additional domains, IPs, or emails. One per line. Prefix with IP: or EMAIL: as needed.">!</span>
                        </label>
                        <textarea class="form-control" id="san" name="san" rows="3" placeholder="One per line:&#10;example.com&#10;*.example.com&#10;IP:192.168.1.1"></textarea>
                        <div class="form-text">DNS names, IP:x.x.x.x, EMAIL:user@example.com</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card mb-3">
                <div class="card-header">Subject</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="cn" class="form-label">Common Name (CN)
                            <span class="field-info" data-bs-toggle="tooltip" title="The primary domain name or identifier (e.g. example.com).">!</span>
                        </label>
                        <input type="text" class="form-control" id="cn" name="cn" required placeholder="example.com">
                    </div>
                    <div class="mb-3">
                        <label for="org" class="form-label">Organization (O)
                            <span class="field-info" data-bs-toggle="tooltip" title="The legal organization name that owns this certificate.">!</span>
                        </label>
                        <input type="text" class="form-control" id="org" name="org">
                    </div>
                    <div class="mb-3">
                        <label for="ou" class="form-label">Organizational Unit (OU)
                            <span class="field-info" data-bs-toggle="tooltip" title="Department or division within the organization (optional).">!</span>
                        </label>
                        <input type="text" class="form-control" id="ou" name="ou">
                    </div>
                    <div class="mb-3">
                        <label for="country" class="form-label">Country (C)
                            <span class="field-info" data-bs-toggle="tooltip" title="Two-letter ISO 3166-1 country code (e.g. US, DE, GB).">!</span>
                        </label>
                        <input type="text" class="form-control" id="country" name="country" maxlength="2">
                    </div>
                    <div class="mb-3">
                        <label for="state" class="form-label">State (ST)
                            <span class="field-info" data-bs-toggle="tooltip" title="State or province name (optional).">!</span>
                        </label>
                        <input type="text" class="form-control" id="state" name="state">
                    </div>
                    <div class="mb-3">
                        <label for="locality" class="form-label">Locality (L)
                            <span class="field-info" data-bs-toggle="tooltip" title="City or locality name (optional).">!</span>
                        </label>
                        <input type="text" class="form-control" id="locality" name="locality">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button type="submit" class="btn btn-primary">Create Certificate</button>
    <a href="{{ url_for('certificates.list_certs') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}

{% block scripts %}
<script>
function updateKeySizes() {
    const keyType = document.getElementById('key_type').value;
    const keySizeSelect = document.getElementById('key_size');
    keySizeSelect.innerHTML = '';
    if (keyType === 'RSA') {
        keySizeSelect.add(new Option('2048', '2048'));
        keySizeSelect.add(new Option('4096', '4096'));
    } else {
        keySizeSelect.add(new Option('256', '256'));
        keySizeSelect.add(new Option('384', '384'));
    }
}
</script>
{% endblock %}
